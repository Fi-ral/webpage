<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiiral - Wapuro Romaji Converter</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
	<link href="/styles/style.css" rel="stylesheet">
	<script src="/scripts/kana.js"></script>
	<script src="/scripts/base.js" defer></script>
</head>
<body onload="main()">
	<main>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
		<aside id="sideboard-container"></aside>
        
		<article>
			<h1>Wapuro Romaji Converter</h1>

			<div>
				<h4>Output</h4>
				<div class="romaji-output">
					<p class="jp-text" id="romaji-output"></p>
				</div>

				<hr>
				<h4>Input</h4>
				<div class="romaji-input">
					<input type="text" id="romaji-input" oninput="KanaApp.convert(false)" onchange="KanaApp.convert(true)">
					<button onclick="KanaApp.convert(true)">Enter</button>
				</div>

				<hr>
				<h4>Settings</h4>
				<div>
					<span><input type="checkbox" id="setting-katakana-output" onchange="KanaApp.convert(false)"> Output as Katakana</span>
				</div>
			</div>
	</main>
</body>
</html>
